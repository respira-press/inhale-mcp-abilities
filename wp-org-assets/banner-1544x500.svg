<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <rect width="1544" height="500" fill="#fafaf9"/>

  <!-- Icon block: Direction A dot grid, scaled to 200x200 at left -->
  <g transform="translate(100, 150) scale(2)">
    <g fill="#a8a29e">
      <circle cx="20" cy="20" r="4"/><circle cx="32" cy="20" r="4"/><circle cx="44" cy="20" r="4"/><circle cx="56" cy="20" r="4"/><circle cx="68" cy="20" r="4"/><circle cx="80" cy="20" r="4"/>
      <circle cx="20" cy="32" r="4"/><circle cx="32" cy="32" r="4"/><circle cx="44" cy="32" r="4"/><circle cx="56" cy="32" r="4"/><circle cx="68" cy="32" r="4"/><circle cx="80" cy="32" r="4"/>
      <circle cx="20" cy="44" r="4"/><circle cx="32" cy="44" r="4"/><circle cx="44" cy="44" r="4"/><circle cx="56" cy="44" r="4"/><circle cx="68" cy="44" r="4"/><circle cx="80" cy="44" r="4"/>
      <circle cx="20" cy="56" r="4"/><circle cx="32" cy="56" r="4"/><circle cx="44" cy="56" r="4"/><circle cx="56" cy="56" r="4"/><circle cx="68" cy="56" r="4"/><circle cx="80" cy="56" r="4"/>
      <circle cx="20" cy="68" r="4"/><circle cx="32" cy="68" r="4"/><circle cx="44" cy="68" r="4"/><circle cx="56" cy="68" r="4"/><circle cx="68" cy="68" r="4"/><circle cx="80" cy="68" r="4"/>
      <circle cx="20" cy="80" r="4"/><circle cx="32" cy="80" r="4"/><circle cx="44" cy="80" r="4"/><circle cx="56" cy="80" r="4"/><circle cx="68" cy="80" r="4"/><circle cx="80" cy="80" r="4"/>
    </g>
    <g fill="#059669">
      <circle cx="32" cy="32" r="4"/>
      <circle cx="44" cy="56" r="4"/>
      <circle cx="56" cy="20" r="4"/>
      <circle cx="68" cy="68" r="4"/>
      <circle cx="20" cy="80" r="4"/>
    </g>
  </g>

  <!-- Title -->
  <text x="380" y="230" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-weight="500" font-size="64" fill="#1c1917" letter-spacing="-1">Inhale: MCP Abilities</text>

  <!-- Subtitle -->
  <text x="380" y="290" font-family="DM Sans, system-ui, sans-serif" font-weight="400" font-size="22" fill="#57534e">Decide which registered abilities are visible to the default MCP server.</text>

  <!-- Right monogram -->
  <text x="1464" y="240" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-weight="500" font-size="20" fill="#1c1917">by respira</text>
  <text x="1464" y="270" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-weight="400" font-size="16" fill="#059669">respira.press</text>

  <!-- Bottom accent line -->
  <rect x="0" y="498" width="1544" height="2" fill="#059669"/>
</svg>
